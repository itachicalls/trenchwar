# Fly.io deploy (built-in TLS → wss://<app>.fly.dev).
#   fly launch --config server/fly.toml
#   fly deploy --config server/fly.toml
#
# Then set Net.DEFAULT_WSS_URL / TRENCHWAR_WS_URL to wss://YOUR_APP.fly.dev

app = "trenchwar-play"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  TRENCHWAR_PORT = "9080"
  TRENCHWAR_DEDICATED = "1"

[http_service]
  internal_port = 9080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  # No HTTP healthcheck — Godot speaks WebSocket, not GET /.

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
